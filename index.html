    <!-- Strip trailing /index.html from URL -->
    <script>
      (function () {
        try {
          var p = window.location.pathname;
          if (/\/index\.html$/i.test(p)) {
            var clean = p.replace(/\/index\.html$/i, '/') + window.location.search + window.location.hash;
            window.history.replaceState(null, '', clean);
          }
        } catch (e) {}
      })();
    </script>

    <!-- Theme bootstrap (avoid flash) -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('theme');
          var prefersLight = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches;
          var theme = stored || (prefersLight ? 'light' : 'dark');
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>

    <!-- Lang bootstrap (스크린리더 초기 발음 정확도 / FOUC 방지) -->
    <script>
      (function () {
        try {
          var stored = null;
          try { stored = localStorage.getItem('lang'); } catch (e) {}
          var lang;
          if (stored === 'ko' || stored === 'en') {
            lang = stored;
          } else if (typeof navigator !== 'undefined' && navigator.language) {
            lang = navigator.language.toLowerCase().indexOf('en') === 0 ? 'en' : 'ko';
          } else {
            lang = 'ko';
          }
          document.documentElement.setAttribute('lang', lang);
        } catch (e) {
          document.documentElement.setAttribute('lang', 'ko');
        }
      })();
    </script>
